{% extends "base.html" %}

{% block contenido %}
  <h2>Editar tarea</h2>
  <p>Edita el título y guarda los cambios.</p>

  <form method="POST">
    <label>Título</label>
    <input type="text" name="titulo" value="{{ tarea.titulo }}" required>

    <button class="btn" type="submit">Actualizar</button>
    <a class="btn btn-secondary" href="{{ url_for('main.listar_tareas') }}">Cancelar</a>
  </form>
{% endblock %}
